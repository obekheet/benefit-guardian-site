<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between CHIP and Medicaid?","acceptedAnswer":{"@type":"Answer","text":"Medicaid covers eligible low-income individuals and families, while CHIP covers children in families that earn too much for Medicaid but still need affordable coverage."}},{"@type":"Question","name":"Does Texas CHIP cost anything?","acceptedAnswer":{"@type":"Answer","text":"CHIP is low-cost. Families may pay a small annual enrollment fee and modest co-pays depending on income, but coverage is designed to be affordable."}},{"@type":"Question","name":"What does CHIP cover for my child?","acceptedAnswer":{"@type":"Answer","text":"CHIP covers checkups, immunizations, doctor visits, prescriptions, dental and vision care, hospital care, and lab tests, among other services."}},{"@type":"Question","name":"How do I apply for CHIP in Texas?","acceptedAnswer":{"@type":"Answer","text":"You can apply online through YourTexasBenefits, by phone, or in person. See hhs.texas.gov for current application options and eligibility details."}}]}</script>
