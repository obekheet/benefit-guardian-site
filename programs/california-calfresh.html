  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much will I get from CalFresh?","acceptedAnswer":{"@type":"Answer","text":"There is no fixed amount. CalFresh benefits depend on your household size, countable income, and certain monthly expenses such as housing and utilities, so the amount is calculated for each household individually."}},{"@type":"Question","name":"Is CalFresh the same as SNAP?","acceptedAnswer":{"@type":"Answer","text":"Yes. CalFresh is California’s name for the federal SNAP program. It provides the same kind of monthly food benefits, issued on an EBT card."}},{"@type":"Question","name":"Where can I use CalFresh benefits?","acceptedAnswer":{"@type":"Answer","text":"CalFresh benefits are loaded onto an EBT card each month and can be used to buy eligible food at grocery stores and farmers markets that accept EBT."}},{"@type":"Question","name":"How do I apply for CalFresh?","acceptedAnswer":{"@type":"Answer","text":"You can apply through your county social services office or online, or call the CalFresh Benefits Helpline at 1-877-847-3663 for help getting started."}}]}</script>
